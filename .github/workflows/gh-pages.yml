name: Deploy Radical Dungeon to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.114 --locked

      - name: Build wasm (release)
        run: |
          cargo build --release --target wasm32-unknown-unknown
          wasm-bindgen --out-dir pkg --target web target/wasm32-unknown-unknown/release/radical_starfinder.wasm

      - name: Prepare dist directory
        run: |
          rm -rf dist
          mkdir -p dist
          cp index.html manifest.json sw.js dist/
          cp -r pkg dist/
          cp -r assets dist/
          touch dist/.nojekyll

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

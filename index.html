<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Radical Dungeon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0b14;
      color: #ccc;
      font-family: 'Segoe UI', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding-top: 16px;
    }
    h1 {
      font-size: 1.4rem;
      color: #ffcc33;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    #loading {
      margin-top: 40px;
      font-size: 1rem;
      opacity: 0.7;
    }
    #game-canvas {
      border: 2px solid #2a2040;
      border-radius: 4px;
    }
    .controls {
      margin-top: 10px;
      font-size: 0.8rem;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>⚗️ Radical Dungeon</h1>
  <div id="loading">Loading WASM…</div>
  <div class="controls">WASD/Arrows=move · Bump=fight · Type pinyin+Enter=attack · Tab/Space=spell · ⚒=forge · ▼=stairs</div>

  <script type="module">
    let start_game;
    try {
      const mod = await import('./pkg/radical_roguelike.js');
      await mod.default();
      start_game = mod.start_game;
    } catch (_) {
      // Trunk mode fallback
      await new Promise((resolve) => {
        if (window.wasmBindings) return resolve();
        window.addEventListener('TrunkApplicationStarted', resolve, { once: true });
      });
      start_game = window.wasmBindings.start_game;
    }
    try {
      start_game();
    } catch (err) {
      console.error('Game init failed:', err);
      const el = document.getElementById('loading');
      if (el) el.textContent = 'Failed to load. See console.';
    }
  </script>
</body>
</html>
